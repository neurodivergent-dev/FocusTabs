<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad_indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8" />
      <stop offset="100%" style="stop-color:#6366F1" />
    </linearGradient>
    <linearGradient id="grad_pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6" />
      <stop offset="100%" style="stop-color:#EC4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#6366F1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background decorative elements -->
  <circle cx="400" cy="100" r="40" fill="#EC4899" fill-opacity="0.1" />
  <circle cx="100" cy="400" r="60" fill="#6366F1" fill-opacity="0.1" />
  
  <!-- Main Illustration: Stylized Mountain/Goal Achievement -->
  <path d="M100 400 L250 150 L400 400" fill="url(#grad_indigo)" fill-opacity="0.1" />
  <path d="M150 400 L250 200 L350 400" fill="url(#grad_indigo)" fill-opacity="0.2" />
  
  <!-- Central Shield/Medal -->
  <circle cx="250" cy="250" r="120" fill="url(#grad_indigo)" filter="url(#softShadow)" />
  
  <!-- Stylized Focus Icon (Target) -->
  <circle cx="250" cy="250" r="80" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="10 10" stroke-opacity="0.5" />
  <circle cx="250" cy="250" r="50" stroke="#FFFFFF" stroke-width="4" />
  <circle cx="250" cy="250" r="15" fill="#FFFFFF" />
  
  <!-- Checkmark orbiting -->
  <g transform="translate(320, 180)">
    <circle r="35" fill="url(#grad_pink)" filter="url(#softShadow)" />
    <path d="M-15 0 L-5 10 L15 -10" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
