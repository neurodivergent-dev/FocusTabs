
  <svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:0.9" />
        <stop offset="100%" style="stop-color:#3A7BC9;stop-opacity:0.9" />
      </linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.2"/>
      </filter>
    </defs>
    
    <!-- Background Elements -->
    <rect width="500" height="500" fill="none"/>
    
    <!-- Main Logo Circle -->
    <circle cx="250" cy="250" r="150" fill="url(#grad1)" filter="url(#shadow)"/>
    
    <!-- Checkmark -->
    <path d="M180 250L230 300L320 210" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  