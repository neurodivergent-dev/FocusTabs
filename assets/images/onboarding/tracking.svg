
  <svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="barGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:0.9" />
        <stop offset="100%" style="stop-color:#6BA5E7;stop-opacity:0.9" />
      </linearGradient>
    </defs>
    
    <!-- Background -->
    <rect width="500" height="500" fill="none"/>
    
    <!-- Minimal Chart Grid -->
    <rect x="100" y="100" width="300" height="300" fill="none" stroke="#858585" stroke-width="2" stroke-opacity="0.3"/>
    
    <!-- Chart Bars - Minimalist -->
    <rect x="150" y="300" width="40" height="100" rx="4" fill="url(#barGrad1)"/>
    <rect x="230" y="200" width="40" height="200" rx="4" fill="url(#barGrad1)"/>
    <rect x="310" y="250" width="40" height="150" rx="4" fill="url(#barGrad1)"/>
    
    <!-- Trend Line -->
    <path d="M170 300 L250 200 L330 250" stroke="#66BB6A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="170" cy="300" r="8" fill="#66BB6A"/>
    <circle cx="250" cy="200" r="8" fill="#66BB6A"/>
    <circle cx="330" cy="250" r="8" fill="#66BB6A"/>
  </svg>
  