<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad_indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8" />
      <stop offset="100%" style="stop-color:#6366F1" />
    </linearGradient>
    <linearGradient id="grad_success" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399" />
      <stop offset="100%" style="stop-color:#10B981" />
    </linearGradient>
    <filter id="shadow_soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="15" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect x="120" y="140" width="280" height="340" rx="24" fill="#FFFFFF" fill-opacity="0.1" />
  
  <!-- Back Card -->
  <rect x="110" y="110" width="280" height="280" rx="24" fill="#6366F1" fill-opacity="0.05" />
  
  <!-- Main Card Container -->
  <rect x="100" y="80" width="300" height="340" rx="32" fill="#FFFFFF" filter="url(#shadow_soft)" />
  
  <!-- Card Header -->
  <path d="M100 112 C100 94.3269 114.327 80 132 80 H368 C385.673 80 400 94.3269 400 112 V140 H100 V112 Z" fill="url(#grad_indigo)" />
  <text x="130" y="115" fill="#FFFFFF" font-family="Arial" font-size="20" font-weight="600">Daily Tasks</text>
  
  <!-- Task 1 (Done) -->
  <g transform="translate(130, 170)">
    <rect x="0" y="0" width="36" height="36" rx="10" fill="url(#grad_success)" />
    <path d="M10 18 L16 24 L26 14" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="52" y="10" width="160" height="12" rx="6" fill="#10B981" fill-opacity="0.2" />
    <rect x="52" y="26" width="100" height="8" rx="4" fill="#E5E7EB" />
  </g>
  
  <!-- Task 2 (Current Focus) -->
  <g transform="translate(130, 240)">
    <rect x="0" y="0" width="36" height="36" rx="10" stroke="#6366F1" stroke-width="3" fill="none" />
    <circle cx="18" cy="18" r="4" fill="#6366F1" />
    <rect x="52" y="10" width="180" height="12" rx="6" fill="#6366F1" fill-opacity="0.1" />
    <rect x="52" y="26" width="120" height="8" rx="4" fill="#E5E7EB" />
  </g>
  
  <!-- Task 3 (Upcoming) -->
  <g transform="translate(130, 310)">
    <rect x="0" y="0" width="36" height="36" rx="10" stroke="#E5E7EB" stroke-width="3" fill="none" />
    <rect x="52" y="10" width="140" height="12" rx="6" fill="#F3F4F6" />
    <rect x="52" y="26" width="80" height="8" rx="4" fill="#F3F4F6" />
  </g>
  
  <!-- Floating Sparkles -->
  <circle cx="420" cy="150" r="12" fill="#F59E0B" fill-opacity="0.2" />
  <path d="M410 320 L420 310 L430 320 L420 330 Z" fill="#EC4899" fill-opacity="0.2" />
</svg>
